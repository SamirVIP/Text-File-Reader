kind = "web"
previewPath = "/"
title = "FF Tools"
version = "1.0.0"
id = "artifacts/ff-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22091

[services.development]
run = "pnpm --filter @workspace/ff-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ff-tools", "run", "build" ]
publicDir = "artifacts/ff-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22091"
BASE_PATH = "/"
